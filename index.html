<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cloud Secure Storage</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <!-- Auth Card -->
        <div id="login-card" class="card">
            <h2>Cloud Storage Portal</h2>
            <p class="subtitle">Sign in to access secure documents</p>
            <form id="login-form">
                <div class="input-group">
                    <input type="text" id="username-input" placeholder="Username" required>
                </div>
                <div class="input-group">
                    <input type="password" id="password-input" placeholder="Password" required>
                </div>
                <button type="submit" class="btn">Login</button>
                <p id="error-message" class="error-msg"></p>
            </form>
        </div>

        <!-- Master Dashboard -->
        <div id="dashboard" class="card hidden">
            <div class="dashboard-header">
                <div>
                    <h2 id="user-display-name">Storage Dashboard</h2>
                    <span id="role-badge" class="badge">Role</span>
                </div>
                <button id="logout-btn" class="btn btn-secondary">Logout</button>
            </div>

            <!-- Primary Owner Controls -->
            <div id="owner-controls" class="admin-section hidden">
                <h3>User & Role Management</h3>
                <p class="section-desc">Create secure user accounts, assign posts, or suspend system entry.</p>
                
                <!-- Add User Form -->
                <form id="add-user-form" class="admin-form">
                    <input type="text" id="new-username" placeholder="New Username" required>
                    <input type="password" id="new-user-pass" placeholder="Password" required>
                    <select id="new-user-role">
                        <option value="owner">Co-Owner</option>
                        <option value="viewer" selected>Viewer</option>
                    </select>
                    <button type="submit" class="btn btn-sm">Create User</button>
                </form>
                
                <!-- Dynamic User List Grid -->
                <div id="user-management-list" class="control-grid">
                    <!-- Script dynamically injects active users here -->
                </div>
            </div>

            <!-- File Upload Action Block -->
            <div id="upload-section" class="upload-zone hidden">
                <h3>Upload New Document (Max 750KB)</h3>
                <div class="upload-controls">
                    <input type="file" id="file-chooser">
                    <button id="upload-btn" class="btn btn-sm">Upload to Cloud</button>
                </div>
            </div>

            <!-- Global Synchronized Cloud Files Grid -->
            <div class="files-section">
                <h3>Cloud Synchronized Documents</h3>
                <div id="files-grid" class="files-grid">
                    <!-- Script dynamically syncs files from cloud database here -->
                </div>
            </div>
        </div>
    </div>

    <script type="module" src="script.js"></script>
</body>
</html>
