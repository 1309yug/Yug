<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cloud Repository and Identity Admin Panel</title>
  <style>
    :root { 
      /* Core Canvas & Surfaces */
      --bg-main: #0f172a;       /* Deep Slate Blue (Main body background) */
      --bg-surface: #1e293b;    /* Muted Steel Slate (Containers, tables, forms) */
      --bg-row: #334155;        /* Medium Slate (Table headers, active item list rows) */
      
      /* Typography */
      --text-main: #f8fafc;     /* Crisp Chalk White (Headers and primary labels) */
      --text-muted: #94a3b8;    /* Soft Cool Grey (Timestamps, secondary descriptions) */
      
      /* Interactive Accents & States */
      --primary: #38bdf8;       /* Vibrant Electric Blue (Primary actions, active links) */
      --success: #10b981;       /* Vivid Emerald Green (Process Upload, Add User) */
      --danger: #f43f5e;        /* Radiant Rose Red (Delete File, Clear Logs, Disconnect) */
      --border: #334155;        /* Clean Interface Separation Lines */
    }
    
    body { 
      font-family: sans-serif; 
      background: var(--bg-main); 
      padding: 20px; 
      color: var(--text-main); 
    }
    
    .container { 
      max-width: 950px; 
      margin: 0 auto; 
      background: var(--bg-surface); 
      padding: 30px; 
      border-radius: 8px; 
      box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.3);
      border: 1px solid var(--border);
    }
    
    .hidden { display: none !important; }
    
    h2, h3, h4 { 
      border-bottom: 2px solid var(--border); 
      padding-bottom: 8px; 
      color: var(--text-main);
    }
    
    .login-box { 
      max-width: 400px; 
      margin: 80px auto; 
      padding: 30px; 
      background: var(--bg-surface); 
      border-radius: 8px; 
      box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.4); 
      border: 1px solid var(--border);
    }
    
    .form-group { margin-bottom: 15px; }
    .form-group label { display: block; margin-bottom: 5px; font-weight: bold; color: var(--text-muted); }
    
    .form-group input, .form-group select { 
      width: 100%; 
      padding: 10px; 
      background: var(--bg-main);
      color: var(--text-main);
      border: 1px solid var(--border); 
      border-radius: 4px; 
      box-sizing: border-box; 
    }
    .form-group input:focus, .form-group select:focus {
      outline: none;
      border-color: var(--primary);
    }
    
    button { 
      background: var(--primary); 
      color: #0f172a; /* Dark text on light blue button for contrast legibility */
      font-weight: bold;
      border: none; 
      padding: 10px 15px; 
      border-radius: 4px; 
      cursor: pointer; 
      transition: background 0.2s ease;
    }
    button:hover { opacity: 0.9; }
    button:disabled { background: #475569; color: #94a3b8; cursor: not-allowed; }
    
    .btn-danger { background: var(--danger); color: white; }
    .btn-success { background: var(--success); color: white; }
    
    table { width: 100%; border-collapse: collapse; margin-top: 15px; }
    th, td { padding: 12px; text-align: left; border-bottom: 1px solid var(--border); }
    th { background: var(--bg-main); color: var(--text-muted); }
    
    a { color: var(--primary); text-decoration: none; }
    a:hover { text-decoration: underline; }
    
    .row-item { 
      display: flex; 
      justify-content: space-between; 
      align-items: center; 
      padding: 10px; 
      background: var(--bg-row); 
      margin-bottom: 5px; 
      border-radius: 4px; 
      border: 1px solid var(--border);
    }
    
    small { color: var(--text-muted) !important; }
  </style>
</head>
<body>

  <!-- AUTHENTICATION PORTAL -->
  <div id="login-portal" class="login-box">
    <h2>🔐 Security System Login</h2>
    <form id="login-form">
      <div class="form-group">
        <label>Username</label>
        <input type="text" id="username" required>
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="password" required>
      </div>
      <button type="submit" style="width:100%;">Authenticate</button>
    </form>
  </div>

  <!-- CONTROL DASHBOARD -->
  <div id="workspace-dashboard" class="container hidden">
    <div style="display: flex; justify-content: space-between; align-items: center;">
      <h2>📁 Enterprise Repository Management</h2>
      <div>
        <span id="user-badge" style="font-weight:bold; margin-right:15px;"></span>
        <button id="logout-btn" class="btn-danger">Disconnect</button>
      </div>
    </div>

    <!-- DOCUMENT UPLOAD COMPONENT -->
    <div id="upload-panel" class="hidden" style="background: var(--bg-surface); padding: 20px; border-radius: 6px; margin: 20px 0; border: 1px solid var(--border);">
      <h3>📤 Store New Document File</h3>
      <div class="form-group">
        <input type="file" id="file-input">
      </div>
      <button id="upload-btn" class="btn-success">Process Upload</button>
    </div>

    <!-- MAIN REPOSITORY REGISTRY -->
    <h3>Document Store</h3>
    <table>
      <thead>
        <tr><th>Resource File Name</th><th>Stored By</th><th>Action</th></tr>
      </thead>
      <tbody id="file-list-body"></tbody>
    </table>

    <!-- ADMINISTRATIVE CONTROL LAYER (Hidden for regular viewers) -->
    <div id="admin-panel" class="hidden" style="margin-top: 40px; border-top: 3px solid var(--border); padding-top: 20px;">
      <h3>👥 Security Operations Console</h3>
      
      <!-- ADD & SYNC NEW USER PROFILE -->
      <form id="add-user-form" style="display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 25px; padding: 15px; background: var(--bg-main); border: 1px solid var(--border); border-radius: 6px;">
        <input type="text" id="new-username" placeholder="Target Username" required style="flex:1; padding:8px; background: var(--bg-surface); color: var(--text-main); border: 1px solid var(--border);">
        <input type="password" id="new-password" placeholder="System Password" required style="flex:1; padding:8px; background: var(--bg-surface); color: var(--text-main); border: 1px solid var(--border);">
        <select id="new-role" style="padding:8px; background: var(--bg-surface); color: var(--text-main); border: 1px solid var(--border);">
          <option value="viewer">Viewer</option>
          <option value="editor">Editor</option>
          <option value="primary_owner">Primary Owner</option>
        </select>
        <button type="submit" class="btn-success">Add & Sync User</button>
      </form>

      <!-- PANELS FOR ACCOUNT ACTIVE DIRECTORY & EXPIRED ATTACKS -->
      <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
        <div>
          <h4>Active Directory Users</h4>
          <div id="user-registry-container"></div>
        </div>
        <div>
          <h4>⚠️ Security Incident Logs (Failed Logins)</h4>
          <div id="failed-logs-container"></div>
        </div>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
